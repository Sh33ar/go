<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة نديم</title>

<!-- Google Analytics -->

<script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-RWD0WHS7EV');
</script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',system-ui;
background:#0f1c1e;
color:white;
transition:.4s;
}

.light{
background:linear-gradient(135deg,#eef7f8,#ffffff);
color:#0C4F57;
}

.hero{text-align:center;padding:40px 20px 10px}
.hero img{width:280px;max-width:90%;filter:drop-shadow(0 25px 45px rgba(0,0,0,.4))}

.card{
max-width:460px;
margin:15px auto;
background:#1b2a2d;
border-radius:28px;
padding:20px;
box-shadow:0 25px 60px rgba(0,0,0,.4);
}

.light .card{background:white}

.btn{
display:flex;
align-items:center;
justify-content:center;
padding:18px;
margin:12px 0;
border-radius:20px;
text-decoration:none;
font-weight:800;
font-size:16px;
background:#223538;
color:white;
transition:.25s;
}

.light .btn{
background:#f7fbfb;
color:#0C4F57;
}

.btn:hover{transform:translateY(-4px)}

.map{margin-top:15px;border-radius:18px;overflow:hidden}
.map iframe{width:100%;height:170px;border:0}

.themeToggle{
position:fixed;
top:15px;
left:15px;
background:#ff7a00;
color:white;
padding:10px 14px;
border-radius:12px;
font-weight:800;
cursor:pointer;
z-index:99;
}

.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

.langSwitch{
display:block;
text-align:center;
margin-top:18px;
text-decoration:none;
color:#aaa;
}

.counter{text-align:center;margin-top:14px;font-size:14px;color:#888}

.footer{text-align:center;margin:25px 0 40px;color:#888;font-size:13px}

</style>

</head>

<body>

<div class="themeToggle" onclick="toggleTheme()">☀️ / 🌙</div>

<div class="hero">
<img src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">
</div>

<div class="card">

<a class="btn" href="https://www.nadimfoundation.org/" onclick="gtag('event','website_click')">🌐 الموقع الرسمي</a> <a class="btn" href="https://www.facebook.com/share/1Ak98MWsP4/" onclick="gtag('event','facebook_click')">📘 فيسبوك</a> <a class="btn" href="https://www.instagram.com/nadimfoundation?igsh=MTVraHY1cnlvOWZzYQ==" onclick="gtag('event','instagram_click')">📸 انستجرام</a> <a class="btn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA" onclick="gtag('event','youtube_click')">▶ يوتيوب</a> <a class="btn" href="mailto:info@nadimfoundation.org" onclick="gtag('event','email_click')">✉️ البريد الإلكتروني</a> <a class="btn" href="https://www.linkedin.com/company/nadimfoundation/" onclick="gtag('event','linkedin_click')">💼 لينكدإن</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=nadim%20foundation%20cairo&t=&z=14&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<button class="btn" onclick="share()">🔗 مشاركة الصفحة</button>

<div class="counter" id="visits"></div>

</div>

<a class="langSwitch" href="en.html">🌐 English</a>

<a class="whatsapp" href="https://wa.me/201227799564">💬</a>

<div class="footer">Digital Platform — Nadim</div>

<script>

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme",document.body.classList.contains("light"));
gtag('event','theme_switch');
}

if(localStorage.getItem("theme") === "true"){
document.body.classList.add("light");
}

function share(){
if(navigator.share){
navigator.share({title:"Nadim Foundation",url:window.location.href});
}
}

let c = localStorage.getItem("visits") || 0;
c++;
localStorage.setItem("visits",c);
document.getElementById("visits").innerHTML="عدد زياراتك: "+c;

</script>

</body>
</html>
