<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة نديم</title>

<style>

/* نفس ستايل الإنجليزي حرفيًا */
body{
margin:0;
font-family:Tahoma;
text-align:center;
direction:rtl;
transition:background .6s ease,color .6s ease;
background:#0f2024;
color:#e9f6f7;
padding-bottom:100px;
}

.light{
background:#f4f7f8;
color:#0c4f57;
}

.hero{
height:130px;
background:linear-gradient(-45deg,#0c4f57,#0f6c75,#148b96,#0c4f57);
background-size:400% 400%;
animation:gradient 12s ease infinite;
position:relative;
overflow:hidden;
}

.hero::after{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ffffff10 10%,transparent 60%);
animation:pulse 8s infinite;
}

@keyframes pulse{
0%{transform:translate(-20%,-20%) scale(1)}
50%{transform:translate(-10%,-10%) scale(1.2)}
100%{transform:translate(-20%,-20%) scale(1)}
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.logoStrip{
background:#e9f6f7;
padding:28px;
border-radius:0 0 40px 40px;
}

.logo{
width:260px;
max-width:90%;
opacity:0;
transform:translateY(25px);
animation:fadeLogo 1.4s forwards;
}

@keyframes fadeLogo{
to{opacity:1;transform:translateY(0)}
}

.btn{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
background:#17363c;
margin:12px auto;
padding:16px;
border-radius:18px;
text-decoration:none;
color:white;
width:90%;
max-width:420px;
font-weight:bold;
box-shadow:0 10px 25px rgba(0,0,0,.2);
transition:.3s;
}

.light .btn{
background:white;
color:#0c4f57;
}

.btn:hover{
transform:translateY(-3px) scale(1.02);
}

.map{
margin:20px auto;
width:90%;
max-width:420px;
height:150px;
border-radius:18px;
overflow:hidden;
}

.floatingBar{
position:fixed;
bottom:18px;
left:50%;
transform:translateX(-50%);
padding:12px 22px;
border-radius:40px;
display:flex;
gap:20px;
backdrop-filter:blur(14px);
background:rgba(255,255,255,.15);
box-shadow:0 8px 30px rgba(0,0,0,.25);
z-index:999;
}

.ctrl{
font-size:22px;
cursor:pointer;
transition:.4s;
}

.ctrl:active{
transform:scale(.8) rotate(180deg);
}

.footer{
margin:30px;
opacity:.6;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="logoStrip">
<img class="logo"
src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">
</div>

<a class="btn" href="https://www.nadimfoundation.org/">🌐 الموقع الرسمي</a>
<a class="btn" href="https://www.facebook.com/share/1Ak98MWsP4/">📘 فيسبوك</a>
<a class="btn" href="https://www.instagram.com/nadimfoundation?igsh=MTVraHY1cnlvOWZzYQ==">📸 إنستجرام</a>
<a class="btn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA">▶️ يوتيوب</a>
<a class="btn" href="https://wa.me/201227799564">💬 واتساب</a>
<a class="btn" href="mailto:info@nadimfoundation.org">✉️ البريد الإلكتروني</a>
<a class="btn" href="https://www.linkedin.com/company/nadimfoundation/">💼 لينكدإن</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="100%" frameborder="0"></iframe>
</div>

<div class="floatingBar">
<div class="ctrl" onclick="share()">🔗</div>
<div class="ctrl" id="themeBtn" onclick="toggleTheme()">☀️</div>
<a class="ctrl" href="en.html">🌐</a>
</div>

<div class="footer">مؤسسة نديم © ®</div>

<script>

const body=document.body;
const btn=document.getElementById("themeBtn");

if(localStorage.getItem("theme")==null){
if(window.matchMedia('(prefers-color-scheme: light)').matches){
body.classList.add("light");
btn.innerHTML="🌙";
}else{
btn.innerHTML="☀️";
}
}else{
if(localStorage.getItem("theme")=="light"){
body.classList.add("light");
btn.innerHTML="🌙";
}else{
btn.innerHTML="☀️";
}
}

function toggleTheme(){
body.classList.toggle("light");

if(body.classList.contains("light")){
btn.innerHTML="🌙";
localStorage.setItem("theme","light");
}else{
btn.innerHTML="☀️";
localStorage.setItem("theme","dark");
}
}

function share(){
navigator.share({
title:"مؤسسة نديم",
url:window.location.href
});
}

</script>

</body>
</html>
