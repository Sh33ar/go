<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مؤسسة نديم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',system-ui;
background:linear-gradient(135deg,#eef7f8,#ffffff);
min-height:100vh;
overflow-x:hidden;
}

/* Hero */

.hero{
text-align:center;
padding:40px 20px 10px;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1}
}

.hero img{
width:280px;
max-width:90%;
filter:drop-shadow(0 25px 45px rgba(0,0,0,.15));
}

/* Card */

.card{
max-width:460px;
margin:15px auto;
background:white;
border-radius:28px;
padding:20px;
box-shadow:0 25px 60px rgba(0,0,0,.12);
}

/* Buttons */

.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
padding:18px;
margin:12px 0;
border-radius:20px;
text-decoration:none;
font-weight:800;
font-size:16px;
color:#0C4F57;
background:#f7fbfb;
box-shadow:0 12px 24px rgba(0,0,0,.10);
transition:.25s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 22px 35px rgba(0,0,0,.18);
}

/* Map */

.map{
margin-top:15px;
border-radius:18px;
overflow:hidden;
}

.map iframe{
width:100%;
height:170px;
border:0;
}

/* Share Button */

.shareBtn{
width:100%;
margin-top:12px;
}

/* Floating WhatsApp */

.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.3);
z-index:99;
text-decoration:none;
}

/* Language Switch */

.langSwitch{
display:block;
text-align:center;
margin-top:18px;
font-weight:700;
text-decoration:none;
color:#0C4F57;
opacity:.7;
transition:.2s;
}

.langSwitch:hover{
opacity:1;
transform:translateY(-2px);
}

/* Counter */

.counter{
text-align:center;
margin-top:14px;
font-size:14px;
color:#888;
}

/* Footer */

.footer{
text-align:center;
margin:25px 0 40px;
color:#888;
font-size:13px;
}

</style>

</head>

<body>

<div class="hero">
<img src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">
</div>

<div class="card">

<a class="btn" href="https://www.nadimfoundation.org/">🌐 الموقع الرسمي</a> <a class="btn" href="https://www.facebook.com/share/1Ak98MWsP4/">📘 فيسبوك</a> <a class="btn" href="https://www.instagram.com/nadimfoundation?igsh=MTVraHY1cnlvOWZzYQ==">📸 انستجرام</a> <a class="btn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA">▶ يوتيوب</a> <a class="btn" href="mailto:info@nadimfoundation.org">✉️ البريد الإلكتروني</a> <a class="btn" href="https://www.linkedin.com/company/nadimfoundation/">💼 لينكدإن</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=nadim%20foundation%20cairo&t=&z=14&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<button class="btn shareBtn" onclick="share()">🔗 مشاركة الصفحة</button>

<div class="counter" id="visits"></div>

</div>

<a class="langSwitch" href="en.html">🌐 English</a>

<a class="whatsapp" href="https://wa.me/201227799564">💬</a>

<div class="footer">
Digital Operations Platform — Nadim Foundation
</div>

<script>

function share(){
if(navigator.share){
navigator.share({
title:"Nadim Foundation",
url:window.location.href
});
}else{
alert("المشاركة غير مدعومة على جهازك");
}
}

let c = localStorage.getItem("visits") || 0;
c++;
localStorage.setItem("visits",c);
document.getElementById("visits").innerHTML="عدد زياراتك: "+c;

</script>

</body>
</html>
