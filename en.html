<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadim Foundation</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-RWD0WHS7EV"></script>

<script>
window.dataLayer=window.dataLayer||[];
function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());
gtag('config','G-RWD0WHS7EV');
</script>

<script src="tracking.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Cairo';background:linear-gradient(135deg,#eef7f8,#ffffff);color:#0C4F57;transition:.3s}
.dark{background:#0f1c1e;color:white}
.hero{text-align:center;padding:40px 20px 10px}
.logoBox{display:inline-block;padding:22px;border-radius:26px;background:white;box-shadow:0 20px 50px rgba(0,0,0,.15)}
.dark .logoBox{background:#1b2a2d}
.hero img{width:260px;max-width:90%}
.card{max-width:460px;margin:15px auto;background:white;border-radius:28px;padding:20px;box-shadow:0 25px 60px rgba(0,0,0,.12)}
.dark .card{background:#1b2a2d}
.btn{display:flex;justify-content:center;padding:18px;margin:12px 0;border-radius:20px;text-decoration:none;font-weight:800;background:#f7fbfb;color:#0C4F57}
.dark .btn{background:#223538;color:white}
.map{margin-top:15px;border-radius:18px;overflow:hidden}
.map iframe{width:100%;height:170px;border:0}
.topTools{display:flex;justify-content:center;gap:15px;margin-top:10px}
.toolBtn{padding:8px 14px;background:#ff7a00;color:white;border-radius:12px;cursor:pointer;font-weight:700;text-decoration:none}
.whatsapp{position:fixed;bottom:20px;left:20px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;color:white;text-decoration:none}
.footer{text-align:center;margin:25px 0 40px;color:#888;font-size:13px}
</style>

</head>

<body>

<div class="hero">
<div class="logoBox">
<img src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">
</div>
</div>

<div class="card">

<a class="btn" onclick="track('click_website')" href="https://www.nadimfoundation.org/">🌐 Website</a> <a class="btn" onclick="track('click_facebook')" href="https://www.facebook.com/share/1Ak98MWsP4/">📘 Facebook</a> <a class="btn" onclick="track('click_instagram')" href="https://www.instagram.com/nadimfoundation?igsh=MTVraHY1cnlvOWZzYQ==">📸 Instagram</a> <a class="btn" onclick="track('click_youtube')" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA">▶ YouTube</a> <a class="btn" onclick="track('click_email')" href="mailto:info@nadimfoundation.org">✉️ Email</a> <a class="btn" onclick="track('click_linkedin')" href="https://www.linkedin.com/company/nadimfoundation/">💼 LinkedIn</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=nadim%20foundation%20cairo&t=&z=14&ie=UTF8&iwloc=&output=embed"></iframe>
</div>

<button class="btn" onclick="share()">🔗 Share</button>

<div class="topTools">
<a class="toolBtn" href="ar.html">🌐 عربي</a>
<div class="toolBtn" onclick="toggleTheme()">🌙 Theme</div>
</div>

</div>

<a class="whatsapp" onclick="track('click_whatsapp')" href="https://wa.me/201227799564">💬</a>

<div class="footer">Nadim Foundation &copy; &reg;</div>

<script>
if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark");
}

function toggleTheme(){
document.body.classList.toggle("dark");
localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");
gtag('event','theme_switch');
}

function share(){
if(navigator.share){
navigator.share({title:"Nadim",url:location.href});
}else{
alert("Copy link manually");
}
gtag('event','click_share');
}

function track(e){
gtag('event',e,{event_category:'engagement'});
}
</script>

</body>
</html>
