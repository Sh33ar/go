<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadim Foundation</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f7f8;
color:#0c4f57;
text-align:center;
transition:.3s;
}

.dark{
background:#0f2024;
color:#e9f6f7;
}

/* HERO */
.hero{
padding:50px 20px 0;
background:linear-gradient(-45deg,#0c4f57,#0f6c75,#148b96,#0c4f57);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ⭐ ثابتة تحت اللوجو */
.logoStrip{
background:#e9f6f7;
padding:25px 10px;
border-radius:0 0 40px 40px;
}

.logo{
width:260px;
max-width:90%;
opacity:0;
transform:translateY(25px);
animation:fadeLogo 1.4s forwards;
}

@keyframes fadeLogo{
to{opacity:1;transform:translateY(0)}
}

/* BUTTONS */
.btn{
display:block;
background:white;
margin:12px auto;
padding:15px;
border-radius:18px;
text-decoration:none;
color:#0c4f57;
width:90%;
max-width:420px;
font-weight:bold;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.dark .btn{
background:#17363c;
color:white;
}

/* MAP */
.map{
margin:18px auto;
width:90%;
max-width:420px;
height:150px;
border-radius:18px;
overflow:hidden;
}

/* CONTROL BAR */
.controls{
margin-top:18px;
display:flex;
justify-content:center;
gap:14px;
}

.ctrl{
background:white;
border-radius:12px;
padding:10px 14px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.dark .ctrl{
background:#17363c;
color:white;
}

.footer{
margin:25px;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="logoStrip">
<img class="logo"
src="https://raw.githubusercontent.com/Sh33ar/https-github.com-/main/NADIM%20LOGO.png">
</div>

<a class="btn" href="https://www.nadimfoundation.org/">Official Website</a>
<a class="btn" href="https://www.facebook.com/share/1Ak98MWsP4/">Facebook</a>
<a class="btn" href="https://www.instagram.com/nadimfoundation?igsh=MTVraHY1cnlvOWZzYQ==">Instagram</a>
<a class="btn" href="https://www.youtube.com/channel/UCkTYJGluhZ36xbojMuXnKTA">YouTube</a>
<a class="btn" href="https://wa.me/201227799564">WhatsApp</a>
<a class="btn" href="mailto:info@nadimfoundation.org">Email</a>
<a class="btn" href="https://www.linkedin.com/company/nadimfoundation/">LinkedIn</a>

<div class="map">
<iframe src="https://maps.google.com/maps?q=cairo&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="100%" frameborder="0"></iframe>
</div>

<div class="controls">
<div class="ctrl" onclick="share()">🔗</div>
<div class="ctrl" onclick="toggleTheme()">🌙</div>
<a class="ctrl" href="ar.html">🌐</a>
</div>

<div class="footer">
Nadim Foundation © ®
</div>

<script>

function toggleTheme(){
document.body.classList.toggle("dark");
}

function share(){
navigator.share({
title:"Nadim Foundation",
url:window.location.href
});
}

</script>

</body>
</html>
